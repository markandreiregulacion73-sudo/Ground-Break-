<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ground Break</title>

<style>
body {
    font-family: Arial, Helvetica, sans-serif;
    margin: 0;
    background: linear-gradient(to right, gold, #ffd966);
}

/* NAVIGATION */
nav {
    background: grey;
    display: flex;
    justify-content: space-between;
    gap: 60px;
    padding: 15px;
    box-shadow: 0px 4px 10px rgba(0,0,0,0.4);
    flex-wrap: wrap;
    align-items: center;
}

nav a {
    text-decoration: none;
    color: white;
    padding: 16px 15px;
    font-size: 22px;
    font-weight: bold;
}

nav a:hover {
    background: black;
    border-radius: 5px;
}

nav img {
    width: 180px;
    height: 130px;
}

/* SERVICES SECTION */
.services {
    text-align: center;
    padding: 40px;
}

.services h1 {
    font-size: 40px;
    margin-bottom: 30px;
}

.service-container {
    display: flex;
    justify-content: center;
    gap: 40px;
    flex-wrap: wrap;
}

.service-card {
    background: rgba(255,255,255,0.2);
    backdrop-filter: blur(10px);
    border-radius: 15px;
    padding: 20px;
    width: 250px;
    box-shadow: 0px 4px 10px rgba(0,0,0,0.3);
    transition: transform 0.3s;
}

.service-card:hover {
    transform: scale(1.05);
}

.service-card img {
    width: 100%;
    height: 180px;
    object-fit: contain;
}

.service-card h2 {
    margin: 15px 0 10px;
}

.service-card p {
    font-size: 14px;
}
</style>
</head>

<body>

<nav>
    <img src="GroundBreak.png" alt="Ground Break Logo">
    <a href="index.html">Home</a>
    <a href="About.html">About</a>
    <a href="Services.html">Services</a>
    <a href="Contact.html">Contact</a>
</nav>

<!-- SERVICES -->
<section class="services">
    <h1>Our Services</h1>

    <div class="service-container">

        <div class="service-card">
            <img src="games.jpg" alt="Games">
            <h2>Games</h2>
            <p>Enjoy fun and exciting games with friends.</p>
        </div>

        <div class="service-card">
            <img src="cafe.jpg" alt="Cafe">
            <h2>Cafe</h2>
            <p>Relax and enjoy coffee, snacks, and good vibes.</p>
        </div>

    </div>
</section>

</body>
</html>
