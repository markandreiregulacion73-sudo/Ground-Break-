<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ground Break</title>

<style>
@keyframes color-glow {
    0% { color: #d9534f; }
    33% { color: #5bc0de; }
    66% { color: #5cb85c; }
    100% { color: #d9534f; }
}

h1 {
    font-size: 70px;
    text-align: center;
    color: #222;
    margin: 50px 0;
}

body {
    font-family: Arial, Helvetica, sans-serif;
    margin: 0;
    background: linear-gradient(to right, gold, #ffd966);
}

/* NAV */
nav {
    background: grey;
    display: flex;
    justify-content: space-between;
    gap: 60px;
    padding: 15px;
    box-shadow: 0px 4px 10px rgba(0,0,0,0.4);
    flex-wrap: wrap;
    align-items: center;
}

nav a {
    text-decoration: none;
    color: white;
    padding: 16px 15px;
    font-size: 22px;
    font-weight: bold;
}

nav a:hover {
    background: black;
    border-radius: 5px;
}

/* CONTAINER */
.container {
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 40px;
}

/* CONTACT CARD */
.contact-card {
    background: white;
    padding: 30px;
    border-radius: 15px;
    width: 340px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    text-align: left;
    transition: transform 0.3s, box-shadow 0.3s;
}

.contact-card:hover {
    transform: translateY(-10px);
    box-shadow: 0 12px 25px rgba(0,0,0,0.5);
}

.contact-card h2 {
    text-align: center;
    font-size: 30px;
    margin-bottom: 20px;
    animation: color-glow 3s infinite;
}

.contact-card p {
    font-size: 18px;
    margin: 10px 0;
    color: #333;
}

/* FACEBOOK LINK */
.socials {
    display: flex;
    justify-content: flex-start;
    margin-top: 20px;
}

.fb-display {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: bold;
    color: #333;
    text-decoration: none;
    transition: color 0.3s;
}

.fb-display:hover {
    color: #1877f2;
}

.fb-display img {
    width: 40px;
    transition: transform 0.3s;
}

.fb-display img:hover {
    transform: scale(1.2);
}

/* RESPONSIVE */
@media (max-width:768px){
    .container {
        flex-direction: column;
    }
}
</style>
</head>

<body>

<nav>
    <img src="GroundBreak.png" style="width:180px;height:130px;">
    <a href="Home.html">Home</a>
    <a href="About.html">About</a>
    <a href="Services.html">Services</a>
    <a href="Contact.html">Contact</a>
</nav>

<div class="container">
    <div class="contact-card">
        <h2>Contact Us</h2>

        <p>📞 Phone: +09 282 567 994</p>
        <p>📧 Email: groundbreak@email.com</p>
        <p>📍 Location: Rizal, Philippines</p>

        <div class="socials">
            <a href="https://www.facebook.com/GroundBreakBilliardCafe" target="_blank" class="fb-display">
                <img src="fb.png" alt="Facebook">
                <span>Ground Break</span>
            </a>
        </div>
    </div>
</div>

</body>
</html>
